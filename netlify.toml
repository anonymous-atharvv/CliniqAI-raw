[build]
  base    = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION  = "10"

# SPA redirect — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# API proxy to Railway backend (replace with your Railway URL)
[[redirects]]
  from   = "/api/*"
  to     = "https://cliniqai-backend.up.railway.app/api/:splat"
  status = 200
  force  = true
  headers = { X-From = "Netlify" }

[[redirects]]
  from   = "/auth/*"
  to     = "https://cliniqai-backend.up.railway.app/auth/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "https://cliniqai-backend.up.railway.app/health"
  status = 200
  force  = true

# Security headers on all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "no-referrer"
    Permissions-Policy         = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Cache-Control              = "no-store, no-cache, must-revalidate"

# Cache static assets (JS/CSS bundles have content hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
