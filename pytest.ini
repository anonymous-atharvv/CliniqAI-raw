[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests (requires services running)
    clinical: marks clinical validation tests
    unit: marks unit tests
log_cli = true
log_cli_level = WARNING
