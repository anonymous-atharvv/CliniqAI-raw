version: '3.9'

# CliniQAI Local Development Stack
# All services required to run the full platform locally.
# Uses Synthea-generated synthetic data — NEVER run against real patient data in dev.
#
# Start: docker-compose up -d
# Stop: docker-compose down
# Reset: docker-compose down -v (wipes all data)

networks:
  cliniqai_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  qdrant_data:
  orthanc_data:
  prometheus_data:
  grafana_data:

services:

  # ─────────────────────────────────────────────
  # PRIMARY DATABASE: PostgreSQL 16 + TimescaleDB
  # Hot path: vitals time-series, FHIR resources, patient records
  # ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cliniqai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cliniqai
      POSTGRES_USER: ${POSTGRES_USER:-cliniqai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cliniqai} -d cliniqai"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c log_min_duration_statement=1000
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

  # ─────────────────────────────────────────────
  # CACHE + AGENT STATE: Redis 7
  # TTL-based session state for multi-agent system (24h per patient)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cliniqai_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.11
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # STREAMING: Apache Kafka + Zookeeper
  # ICU monitor streams at 1Hz per device
  # Topics: icu.vitals.raw, fhir.normalized, clinical.alerts, ai.feedback, dlq.failed
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cliniqai_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.12
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cliniqai_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Create required Kafka topics
  kafka_setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cliniqai_kafka_setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cliniqai_net
    entrypoint: >
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 6 --topic icu.vitals.raw &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 4 --topic fhir.normalized &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 4 --topic clinical.alerts &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 2 --topic ai.feedback &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 2 --topic dlq.failed &&
        echo 'Kafka topics created successfully'
      "

  # ─────────────────────────────────────────────
  # VECTOR STORE: Qdrant (self-hosted — HIPAA safe)
  # Patient embeddings for semantic search and context retrieval
  # Self-hosted = data never leaves your infrastructure
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: cliniqai_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infrastructure/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.14
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # DICOM SERVER: Orthanc
  # Medical imaging storage with S3 backend
  # Hospitals use DICOM — non-negotiable
  # ─────────────────────────────────────────────
  orthanc:
    image: osimis/orthanc:23.9.0
    container_name: cliniqai_orthanc
    restart: unless-stopped
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - ./infrastructure/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    ports:
      - "8042:8042"
      - "4242:4242"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.15
    environment:
      ORTHANC_USERNAME: ${ORTHANC_USER:-orthanc}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8042/system || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # BACKEND: FastAPI Application
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cliniqai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      QDRANT_HOST: qdrant
      ORTHANC_URL: http://orthanc:8042
    ports:
      - "8000:8000"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.20
    volumes:
      - ./backend:/app
      - ./models:/models:ro  # AI model files (read-only in container)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --reload

  # ─────────────────────────────────────────────
  # FRONTEND: React Application
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cliniqai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.21
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ─────────────────────────────────────────────
  # ICU STREAM SIMULATOR: MQTT + Bridge
  # Simulates ICU monitor data at 1Hz per device
  # Use with Synthea patient data for realistic testing
  # ─────────────────────────────────────────────
  mqtt_broker:
    image: eclipse-mosquitto:2.0
    container_name: cliniqai_mqtt
    restart: unless-stopped
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
      - "9001:9001"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.22

  icu_stream_simulator:
    build:
      context: ./scripts/icu_simulator
    container_name: cliniqai_icu_sim
    restart: unless-stopped
    depends_on:
      - mqtt_broker
      - kafka
    environment:
      MQTT_HOST: mqtt_broker
      MQTT_PORT: 1883
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PATIENT_COUNT: 20  # Simulate 20 ICU patients
      STREAM_RATE_HZ: 1
    networks:
      - cliniqai_net

  # ─────────────────────────────────────────────
  # MONITORING: Prometheus + Grafana
  # Track: API latency, AI inference time, Kafka lag, DB connections
  # HIPAA NOTE: No patient data in metrics. Only system metrics.
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cliniqai_prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.30
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.2.0
    container_name: cliniqai_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-devpassword}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.31

  # ─────────────────────────────────────────────
  # NGINX: Reverse Proxy + TLS Termination
  # In production: uses real TLS 1.3 certs from Let's Encrypt / hospital CA
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cliniqai_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      cliniqai_net:
        ipv4_address: 172.20.0.40
