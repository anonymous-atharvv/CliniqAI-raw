# CliniQAI Nginx Configuration
# TLS 1.3 termination, rate limiting, WebSocket proxying, security headers.
# HIPAA: All traffic encrypted. No PHI in access logs.
# Production: replace self-signed certs with Let's Encrypt or hospital CA.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Security: No PHI in access logs ─────────────────────────────────────
    # Strip query parameters and request bodies from logs.
    log_format hipaa_safe '$remote_addr - $remote_user [$time_local] '
                          '"$request_method $uri $server_protocol" '
                          '$status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          '$request_time';

    access_log /var/log/nginx/access.log hipaa_safe;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    gzip               on;
    gzip_types         text/plain application/json application/javascript text/css;
    gzip_min_length    1024;
    server_tokens      off;   # Hide Nginx version

    # ── Rate Limiting (HIPAA + DDoS protection) ──────────────────────────────
    # API rate limit: 100 req/min per IP
    limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=100r/m;
    # Auth rate limit: 10 req/min per IP (prevent brute force)
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # WebSocket: 10 connections per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ── TLS Configuration ────────────────────────────────────────────────────
    ssl_protocols             TLSv1.3;   # TLS 1.3 ONLY (HIPAA requirement)
    ssl_prefer_server_ciphers on;
    ssl_ciphers               TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Upstream: FastAPI Backend ────────────────────────────────────────────
    upstream cliniqai_backend {
        least_conn;
        server cliniqai-backend:80 max_fails=3 fail_timeout=30s;
        # In K8s: Service handles load balancing, single upstream is fine.
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name cliniqai.hospital.local;   # Update per deployment

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ── Security Headers (HIPAA-aligned) ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "no-referrer" always;
        add_header Cache-Control             "no-store, no-cache, must-revalidate, private" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss:" always;

        # ── Root: Serve Frontend SPA ─────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires -1;
        }

        # ── Auth Endpoints (strict rate limit) ───────────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://cliniqai_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
        }

        # ── API Endpoints ─────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://cliniqai_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;

            # Inference endpoint: longer timeout (AI takes up to 10s)
            location /api/v1/inference/ {
                proxy_read_timeout 15s;
                proxy_pass http://cliniqai_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
        }

        # ── WebSocket: ICU Real-time Stream ──────────────────────────────────
        location /ws/ {
            limit_conn ws_conn 10;

            proxy_pass         http://cliniqai_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;   # Keep WebSocket open for 1 hour
            proxy_send_timeout 3600s;
        }

        # ── Health Check (no auth, no rate limit) ─────────────────────────────
        location /health {
            proxy_pass         http://cliniqai_backend;
            proxy_http_version 1.1;
            access_log         off;
        }

        # ── API Docs (disabled in production) ─────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            return 404;   # Docs disabled in production
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~ /\. {
            deny all;
        }
        location ~ \.(env|git|sql|log|bak)$ {
            deny all;
        }
    }
}
