version: '3.9'

# CliniQAI Production Docker Compose
# Use this for single-server hospital deployments (staging / small pilots).
# For multi-server production: use Kubernetes (see infrastructure/kubernetes/).
#
# DIFFERENCES FROM dev:
# - All services use TLS
# - Secrets from environment (no hardcoded values)
# - Resource limits enforced
# - Health checks with restart policies
# - No development tools (no hot-reload, no mock data)
# - Audit log volume mounted separately for WORM semantics

networks:
  cliniqai_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  postgres_prod_data:
    driver: local
    driver_opts:
      type: none
      device: /data/cliniqai/postgres
      o: bind
  redis_prod_data:
  kafka_prod_data:
  qdrant_prod_data:
  orthanc_prod_data:
  audit_log_data:   # Separate volume for WORM audit logs
  nginx_certs:
  model_weights:    # AI model weights (read-only in containers)

services:

  # ── PostgreSQL + TimescaleDB ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cliniqai_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: cliniqai
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.10
    healthcheck:
      test: [CMD-SHELL, pg_isready -U ${POSTGRES_USER} -d cliniqai]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    command: >
      postgres
      -c shared_preload_libraries=timescaledb,pg_stat_statements
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c log_min_duration_statement=1000
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
      -c log_connections=on
      -c log_disconnections=on

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cliniqai_redis_prod
    restart: always
    volumes:
      - redis_prod_data:/data
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.11
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [CMD, redis-cli, --no-auth-warning, -a, "${REDIS_PASSWORD}", ping]
      interval: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cliniqai_kafka_prod
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-512
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    volumes:
      - kafka_prod_data:/var/lib/kafka/data
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.13
    healthcheck:
      test: [CMD-SHELL, kafka-broker-api-versions --bootstrap-server localhost:9092]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cliniqai_zookeeper_prod
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.12
    healthcheck:
      test: [CMD-SHELL, "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s

  # ── Qdrant (self-hosted — HIPAA safe) ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: cliniqai_qdrant_prod
    restart: always
    volumes:
      - qdrant_prod_data:/qdrant/storage
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.14
    healthcheck:
      test: [CMD-SHELL, curl -sf http://localhost:6333/readyz || exit 1]
      interval: 10s

  # ── Orthanc DICOM ─────────────────────────────────────────────────────────
  orthanc:
    image: osimis/orthanc:23.9.0
    container_name: cliniqai_orthanc_prod
    restart: always
    volumes:
      - orthanc_prod_data:/var/lib/orthanc/db
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.15
    environment:
      ORTHANC_USERNAME: ${ORTHANC_USER}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    image: cliniqai/backend:${APP_VERSION:-1.0.0}
    container_name: cliniqai_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env.production
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_HOST: qdrant
      ORTHANC_URL: http://orthanc:8042
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.20
    volumes:
      - model_weights:/models:ro
      - audit_log_data:/audit_logs
    healthcheck:
      test: [CMD-SHELL, curl -sf http://localhost:8000/health || exit 1]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --log-level warning
      --no-access-log

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    image: cliniqai/frontend:${APP_VERSION:-1.0.0}
    container_name: cliniqai_frontend_prod
    restart: always
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.21

  # ── Nginx (TLS termination + reverse proxy) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cliniqai_nginx_prod
    restart: always
    depends_on:
      - backend
      - frontend
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.40

  # ── Prometheus + Grafana ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cliniqai_prometheus_prod
    restart: always
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.30
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:10.2.0
    container_name: cliniqai_grafana_prod
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_DOMAIN: ${HOSPITAL_DOMAIN:-localhost}
    volumes:
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      cliniqai_prod:
        ipv4_address: 172.21.0.31
